name: Kavita-Pro CI/CD

on:
  push:
    branches:
      - master

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: 📥 Clonar o código-fonte
        uses: actions/checkout@v4

      - name: 🟢 Preparar o Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 🏗️ Compilar o Front-end (Angular)
        run: |
          cd UI/Web
          npm install
          npm run build

      - name: 🟣 Preparar o .NET Core 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: 🔨 Compilar C# (Busca Milimétrica pelo Motor de Arranque)
        run: |
          # 🔍 Localiza o Program.cs que realmente inicia o servidor (builder.Build)
          # Isso ignora bibliotecas e projetos de teste automaticamente.
          CAMINHO_PROGRAM=$(find . -name "Program.cs" | xargs grep -l "builder.Build" | grep -v "Tests" | head -n 1)
          
          # Descobre qual .csproj é dono desse Program.cs
          ARQUIVO_ALVO=$(find $(dirname "$CAMINHO_PROGRAM") -maxdepth 1 -name "*.csproj")
          
          echo "🎯 O VERDADEIRO PROJETO FOI ENCONTRADO: $ARQUIVO_ALVO"
          
          # Publica o projeto real no modo portátil
          dotnet publish "$ARQUIVO_ALVO" -c Release -o ./publish -p:UseAppHost=false -p:GenerateRuntimeConfigurationFiles=true

      - name: 📝 Criar Dockerfile Industrial
        run: |
          cat <<'EOF' > Dockerfile.oracle
          FROM mcr.microsoft.com/dotnet/aspnet:10.0
          
          # Instala dependências essenciais (libvips é vital para o Kavita ler imagens)
          RUN apt-get update && apt-get install -y \
              ca-certificates \
              sqlite3 \
              libicu-dev \
              libvips42 \
              tzdata \
              && rm -rf /var/lib/apt/lists/*
          
          WORKDIR /app
          
          COPY ./publish/ ./
          COPY ./UI/Web/dist/browser/ ./wwwroot/
          
          EXPOSE 5000
          ENV ASPNETCORE_URLS=http://+:5000
          
          # 🚀 SCRIPT SUPREMO: Detecta qual DLL tem o arquivo de configuração e a executa
          ENTRYPOINT ["/bin/sh", "-c", "DLL=$(ls *.runtimeconfig.json | head -n 1 | sed 's/\\.runtimeconfig\\.json/.dll/'); echo \"🚀 Bunker subindo com a DLL: $DLL\"; exec dotnet \"$DLL\""]
          EOF

      - name: 🐳 Configurar Emulador Multi-Arquitetura
        uses: docker/setup-qemu-action@v3

      - name: 🐳 Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🐳 Login no GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 📦 Construir e Publicar a Imagem Docker (ARM64)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.oracle
          platforms: linux/arm64
          push: true
          tags: ghcr.io/eufrauzino/kavita-pro:latest