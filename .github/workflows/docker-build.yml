name: Kavita-Pro CI/CD

on:
  push:
    branches:
      - master

jobs:
  build-and-publish:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Clonar o código-fonte
        uses: actions/checkout@v4

      - name: 🟢 Preparar o Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 🏗️ Compilar o Front-end (Angular)
        run: |
          cd UI/Web
          npm install
          npm run build

      - name: 🟣 Preparar o .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: 🔎 RAIO-X BRUTAL (CRASH INTENCIONAL)
        run: |
          mkdir -p _output
          
          ARQUIVO_ALVO=$(find . -type f \( -name "Kavita.csproj" -o -name "API.csproj" \) | grep -v "node_modules" | head -n 1)
          
          dotnet publish "$ARQUIVO_ALVO" -c Release -r linux-arm64 --self-contained true -o ./Kavita
          
          cd Kavita
          rm -f createdump Copyright LICENSE README.md || true
          
          echo "========================================================="
          echo "🚨 ATENÇÃO DOUGLAS: COPIE A LISTA DE ARQUIVOS ABAIXO 🚨"
          echo "========================================================="
          # Lista apenas os ficheiros MAIORES que 1 Megabyte
          find . -type f -size +1M -exec ls -lh {} +
          echo "========================================================="
          
          # MATA O PROCESSO DE PROPÓSITO PARA O GITHUB MOSTRAR O LOG!
          exit 1