name: Kavita-Pro CI/CD

on:
  push:
    branches:
      - master

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: 📥 Clonar o código-fonte
        uses: actions/checkout@v4

      - name: 🟢 Preparar o Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 🏗️ Compilar o Front-end (Angular)
        run: |
          cd UI/Web
          npm install
          npm run build

      - name: 🟣 Preparar o .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: 🔨 Compilar C# e Ajustar Nomes
        run: |
          mkdir -p _output
          
          ARQUIVO_ALVO=$(find . -type f \( -name "Kavita.csproj" -o -name "API.csproj" \) | grep -v "node_modules" | head -n 1)
          
          dotnet publish "$ARQUIVO_ALVO" -c Release -r linux-arm64 --self-contained true -o ./Kavita
          
          # 🔥 A CORREÇÃO DE MESTRE:
          cd Kavita
          
          # 1. ASSASSINA O IMPOSTOR: Apaga o debugger antes que ele cause problemas
          rm -f createdump
          
          # 2. Renomeia o executável verdadeiro (API) para Kavita
          if [ -f "API" ]; then
            mv API Kavita
            echo "✅ Executável API renomeado para Kavita!"
          elif [ -f "kavita" ]; then
            mv kavita Kavita
          fi
          
          chmod +x Kavita || true
          cd ..
          
          # Zipa a pasta inteira
          tar -czvf _output/kavita-linux-arm64.tar.gz Kavita/

      - name: 🐳 Configurar Emulador Multi-Arquitetura (QEMU)
        uses: docker/setup-qemu-action@v3

      - name: 🐳 Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🐳 Login no GitHub Container Registry (GHCR)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 📦 Construir e Publicar a Imagem Docker (ARM64)
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/arm64
          push: true
          tags: ghcr.io/eufrauzino/kavita-pro:latest