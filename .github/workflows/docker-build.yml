name: Kavita-Pro CI/CD

on:
  push:
    branches:
      - master

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: 📥 Clonar o código-fonte
        uses: actions/checkout@v4

      - name: 🟢 Preparar o Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 🏗️ Compilar o Front-end (Angular)
        run: |
          cd UI/Web
          npm install
          npm run build

      - name: 🟣 Preparar o .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: 🔨 Compilar C# (Sem Truques, Apenas Código Puro)
        run: |
          # Encontra cirurgicamente o projeto real (ignorando a palavra Tests)
          ARQUIVO_ALVO=$(find . -type f -name "*.csproj" | grep -iE "Kavita.Server.csproj|API.csproj" | grep -v "Tests" | head -n 1)
          echo "🎯 Compilando o projeto: $ARQUIVO_ALVO"
          
          # Publica os ficheiros soltos de forma padrão, na pasta "publish"
          dotnet publish "$ARQUIVO_ALVO" -c Release -r linux-arm64 --self-contained true -o ./publish

      - name: 📝 Criar Dockerfile Customizado (Adeus Caixa Negra)
        run: |
          # Vamos gerar o nosso próprio Dockerfile on-the-fly, totalmente imune a erros de nome!
          cat <<EOF > Dockerfile.oracle
          FROM ubuntu:noble
          
          # Instala dependências base do Linux para o .NET e SQLite rodarem
          RUN apt-get update && apt-get install -y ca-certificates libicu-dev libssl-dev tzdata sqlite3 && rm -rf /var/lib/apt/lists/*
          
          WORKDIR /app
          
          # Copia os binários originais intocados (seja Kavita.Server ou API)
          COPY ./publish/ ./
          
          # Copia o site (Angular) para onde o backend espera que ele esteja
          COPY ./UI/Web/dist/browser/ ./wwwroot/
          
          # Garante permissão no que quer que a Microsoft tenha gerado
          RUN chmod +x ./Kavita.Server || true
          RUN chmod +x ./API || true
          
          EXPOSE 5000
          ENV ASPNETCORE_URLS=http://+:5000
          
          # Script inteligente: Roda o que existir sem quebrar referências JSON
          ENTRYPOINT ["sh", "-c", "if [ -f ./Kavita.Server ]; then ./Kavita.Server; else ./API; fi"]
          EOF
          
          echo "✅ Dockerfile.oracle criado com sucesso!"

      - name: 🐳 Configurar Emulador Multi-Arquitetura
        uses: docker/setup-qemu-action@v3

      - name: 🐳 Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🐳 Login no GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 📦 Construir e Publicar a Imagem Docker (ARM64)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.oracle # Ignora o original deles e usa o nosso!
          platforms: linux/arm64
          push: true
          tags: ghcr.io/eufrauzino/kavita-pro:latest