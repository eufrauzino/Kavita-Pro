name: Kavita-Pro CI/CD

on:
  push:
    branches:
      - master

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: 📥 Clonar o código-fonte
        uses: actions/checkout@v4

      - name: 🟢 Preparar o Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 🏗️ Compilar o Front-end (Angular)
        run: |
          cd UI/Web
          npm install
          npm run build

      - name: 🟣 Preparar o .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: 🔨 Compilar C# e Ajustar Nomes
        run: |
          mkdir -p _output
          
          # Procura dinamicamente pelo projeto principal
          ARQUIVO_ALVO=$(find . -type f -name "*.csproj" | grep -v "node_modules" | grep -iE "Kavita.Server|API" | head -n 1)
          
          # Compila a aplicação
          dotnet publish "$ARQUIVO_ALVO" -c Release -r linux-arm64 --self-contained true -o ./Kavita
          
          cd Kavita
          rm -f createdump Copyright LICENSE README.md || true
          
          # 🔥 O XEQUE-MATE: Renomeia o executável exato!
          if [ -f "Kavita.Server" ]; then
            mv Kavita.Server Kavita
            echo "✅ Sucesso: Kavita.Server renomeado para Kavita!"
          elif [ -f "API" ]; then
            mv API Kavita
          fi
          
          chmod +x Kavita || true
          cd ..
          
          # Zipa a pasta inteira
          tar -czvf _output/kavita-linux-arm64.tar.gz Kavita/

      - name: 🐳 Configurar Emulador Multi-Arquitetura (QEMU)
        uses: docker/setup-qemu-action@v3

      - name: 🐳 Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🐳 Login no GitHub Container Registry (GHCR)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 📦 Construir e Publicar a Imagem Docker (ARM64)
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/arm64
          push: true
          tags: ghcr.io/eufrauzino/kavita-pro:latest