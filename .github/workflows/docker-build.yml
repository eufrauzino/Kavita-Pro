name: Kavita-Pro CI/CD

on:
  push:
    branches:
      - master

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: 📥 Clonar o código-fonte
        uses: actions/checkout@v4

      - name: 🟢 Preparar o Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 🏗️ Compilar o Front-end (Angular)
        run: |
          cd UI/Web
          npm install
          npm run build

      - name: 🟣 Preparar o .NET Core 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: 🔨 Compilar C# (Kavita.Server)
        run: |
          # 🎯 Localiza o projeto principal com precisão
          ARQUIVO_ALVO=$(find . -type f -name "Kavita.Server.csproj" | grep -v "Tests" | head -n 1)
          if [ -z "$ARQUIVO_ALVO" ]; then ARQUIVO_ALVO=$(find . -type f -name "API.csproj" | head -n 1); fi
          
          echo "🎯 Compilando o motor principal: $ARQUIVO_ALVO"
          dotnet publish "$ARQUIVO_ALVO" -c Release -o ./publish -p:UseAppHost=false

      - name: 📝 Criar Dockerfile de Produção (Versão Bunker)
        run: |
          cat <<'EOF' > Dockerfile.oracle
          FROM mcr.microsoft.com/dotnet/aspnet:10.0
          
          # Dependências e criação de pastas
          RUN apt-get update && apt-get install -y ca-certificates sqlite3 libicu-dev libvips42 tzdata && \
              rm -rf /var/lib/apt/lists/* && \
              mkdir -p /app/config /app/data /app/defaults
          
          WORKDIR /app
          
          # Copia os arquivos compilados
          COPY ./publish/ ./
          COPY ./UI/Web/dist/browser/ ./wwwroot/
          
          # 🔥 BUNKER BLINDADO: Copia o appsettings ORIGINAL do repositório para /app/defaults/
          # Volume da VM jamais monta em /app/defaults → este arquivo nunca some
          COPY Kavita.Server/config/appsettings.json /app/defaults/appsettings.json
          
          EXPOSE 5000
          ENV ASPNETCORE_URLS=http://+:5000
          
          # 🚀 ENTRYPOINT INTELIGENTE (O SEGREDO DA VITÓRIA):
          # Se a pasta /config estiver vazia por causa do volume da VM, ele copia o backup.
          ENTRYPOINT ["/bin/sh", "-c", " \
            if [ ! -f /app/config/appsettings.json ]; then \
              echo '⚠️ Pasta config vazia! Restaurando appsettings.json padrão...'; \
              cp /app/defaults/appsettings.json /app/config/appsettings.json; \
            fi; \
            DLL=$(ls Kavita.Server.dll 2>/dev/null || ls API.dll 2>/dev/null || ls *.runtimeconfig.json | head -n 1 | sed 's/\\.runtimeconfig\\.json/.dll/'); \
            echo \"🚀 Bunker Kavita Online com DLL: $DLL\"; \
            exec dotnet \"$DLL\" \
          "]
          EOF

      - name: 🐳 Configurar Emulador Multi-Arquitetura
        uses: docker/setup-qemu-action@v3

      - name: 🐳 Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🐳 Login no GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 📦 Construir e Publicar a Imagem (ARM64)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.oracle
          platforms: linux/arm64
          push: true
          tags: ghcr.io/eufrauzino/kavita-pro:latest