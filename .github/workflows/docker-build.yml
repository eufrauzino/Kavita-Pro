name: Kavita-Pro CI/CD

on:
  push:
    branches:
      - master

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: 📥 Clonar o código-fonte
        uses: actions/checkout@v4

      - name: 🟢 Preparar o Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 🏗️ Compilar o Front-end (Angular)
        run: |
          cd UI/Web
          npm install
          npm run build

      - name: 🟣 Preparar o .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: 🔨 Compilar C# (Forçando a criação do Executável)
        run: |
          ARQUIVO_ALVO=$(find . -type f -name "*.csproj" | grep -iE "Kavita.API.csproj|API.csproj|Kavita.Server.csproj" | grep -v "Tests" | head -n 1)
          echo "🎯 Compilando o projeto: $ARQUIVO_ALVO"
          
          # 🔥 O SEGREDO: '-p:UseAppHost=true' ignora a trava do desenvolvedor e FORÇA a criação do executável nativo!
          dotnet publish "$ARQUIVO_ALVO" -c Release -r linux-arm64 --self-contained true -p:UseAppHost=true -o ./publish

      - name: 📝 Criar Dockerfile Autônomo
        run: |
          cat <<'EOF' > Dockerfile.oracle
          FROM ubuntu:noble
          
          RUN apt-get update && apt-get install -y ca-certificates libicu-dev libssl-dev tzdata sqlite3 && rm -rf /var/lib/apt/lists/*
          
          WORKDIR /app
          
          COPY ./publish/ ./
          COPY ./UI/Web/dist/browser/ ./wwwroot/
          
          EXPOSE 5000
          ENV ASPNETCORE_URLS=http://+:5000
          
          # 🤖 SCRIPT INTELIGENTE: Lê o arquivo deps.json, descobre o nome da aplicação sozinho, dá permissão e roda!
          ENTRYPOINT ["/bin/sh", "-c", "NOME=$(ls *.deps.json | head -n 1 | sed 's/\\.deps\\.json//'); chmod +x \"./$NOME\"; exec \"./$NOME\""]
          EOF

      - name: 🐳 Configurar Emulador Multi-Arquitetura
        uses: docker/setup-qemu-action@v3

      - name: 🐳 Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🐳 Login no GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 📦 Construir e Publicar a Imagem Docker (ARM64)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.oracle
          platforms: linux/arm64
          push: true
          tags: ghcr.io/eufrauzino/kavita-pro:latest