name: Kavita-Pro CI/CD

on:
  push:
    branches:
      - master # O robô acorda quando fazes push para a master

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: 📥 Clonar o código-fonte
        uses: actions/checkout@v4

      - name: 🟢 Preparar o Node.js (Para o Front-end)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 🏗️ Compilar o Front-end (Angular)
        run: |
          cd UI/Web
          npm install
          npm run build

      - name: 🟣 Preparar o .NET Core (Para o Backend)
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x' # Versão que o Kavita exige

      - name: 🔨 Compilar C# e Ajustar Nomes
        run: |
          mkdir -p _output
          
          ARQUIVO_ALVO=$(find . -type f \( -name "Kavita.csproj" -o -name "API.csproj" \) | grep -v "node_modules" | head -n 1)
          
          dotnet publish "$ARQUIVO_ALVO" -c Release -r linux-arm64 --self-contained true -o ./Kavita
          
          cd Kavita
          rm -f Copyright LICENSE README.md || true
          
          # Tentativa Explícita 1: O .NET gera o binário com o nome "API".
          if [ -f "API" ]; then
            mv API Kavita
          fi
          
          # Tentativa Explícita 2: Caso gere como "kavita" minúsculo.
          if [ -f "kavita" ]; then
            mv kavita Kavita
          fi
          
          # Tentativa 3: Pega o maior arquivo sem extensão (Pulo do gato sem depender do comando find)
          MAIOR=$(ls -S | grep -v '\.' | head -n 1)
          if [ -n "$MAIOR" ] && [ "$MAIOR" != "Kavita" ]; then
            mv "$MAIOR" Kavita
          fi
          
          chmod +x Kavita || true
          cd ..
          
          # Zipa a pasta inteira
          tar -czvf _output/kavita-linux-arm64.tar.gz Kavita/

      - name: 🐛 Espião no Dockerfile (Vacina)
        run: |
          # Se falhar novamente, o Docker vai imprimir todos os arquivos na tela para nós!
          sed -i '/RUN chmod +x \/Kavita\/Kavita/i RUN ls -la \/Kavita || true' Dockerfile

      - name: 🐳 Configurar Emulador Multi-Arquitetura (QEMU)
        uses: docker/setup-qemu-action@v3

      - name: 🐳 Configurar Docker Buildx (Para empacotar em ARM)
        uses: docker/setup-buildx-action@v3

      - name: 🐳 Login no GitHub Container Registry (GHCR)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 📦 Construir e Publicar a Imagem Docker (ARM64)
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/arm64
          push: true
          tags: ghcr.io/eufrauzino/kavita-pro:latest