name: Kavita-Pro CI/CD

on:
  push:
    branches:
      - master

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: 📥 Clonar o código-fonte
        uses: actions/checkout@v4

      - name: 🟢 Preparar o Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 🏗️ Compilar o Front-end (Angular)
        run: |
          cd UI/Web
          npm install
          npm run build

      - name: 🟣 Preparar o .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: 🔨 Compilar C# (Modo Oficial da Microsoft)
        run: |
          ARQUIVO_ALVO=$(find . -type f -name "*.csproj" | grep -iE "Kavita.API.csproj|API.csproj|Kavita.Server.csproj" | grep -v "Tests" | head -n 1)
          echo "🎯 Compilando o projeto: $ARQUIVO_ALVO"
          
          # 🔥 Não tentamos mais criar um executável. Geramos apenas as DLLs puras para a arquitetura ARM64!
          dotnet publish "$ARQUIVO_ALVO" -c Release -r linux-arm64 --self-contained false -o ./publish

      - name: 📝 Criar Dockerfile com Motor .NET Nativo
        run: |
          cat <<'EOF' > Dockerfile.oracle
          # Usa a imagem OFICIAL da Microsoft que já tem o motor 'dotnet' instalado
          FROM mcr.microsoft.com/dotnet/aspnet:8.0
          
          # Dependências do sistema
          RUN apt-get update && apt-get install -y sqlite3 libicu-dev tzdata && rm -rf /var/lib/apt/lists/*
          
          WORKDIR /app
          
          COPY ./publish/ ./
          COPY ./UI/Web/dist/browser/ ./wwwroot/
          
          EXPOSE 5000
          ENV ASPNETCORE_URLS=http://+:5000
          
          # 🚀 A CHAVE MESTRA: O motor 'dotnet' roda a DLL diretamente! Sem precisar de permissões ou executáveis!
          ENTRYPOINT ["/bin/sh", "-c", "NOME=$(ls *.deps.json | head -n 1 | sed 's/\\.deps\\.json/.dll/'); exec dotnet \"./$NOME\""]
          EOF

      - name: 🐳 Configurar Emulador Multi-Arquitetura
        uses: docker/setup-qemu-action@v3

      - name: 🐳 Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🐳 Login no GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 📦 Construir e Publicar a Imagem Docker (ARM64)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.oracle
          platforms: linux/arm64
          push: true
          tags: ghcr.io/eufrauzino/kavita-pro:latest