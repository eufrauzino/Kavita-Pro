name: Kavita-Pro CI/CD

on:
  push:
    branches:
      - master

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: 📥 Clonar o código-fonte
        uses: actions/checkout@v4

      - name: 🟢 Preparar o Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 🏗️ Compilar o Front-end (Angular)
        run: |
          cd UI/Web
          npm install
          npm run build

      - name: 🟣 Preparar o .NET Core 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: 🔨 Compilar C# (O Raio-X de Arquiteto)
        run: |
          # 🔥 O TRUQUE DE GÊNIO: Procura pelo projeto que tem o "DNA" de servidor Web, ignorando os nomes mentirosos!
          ARQUIVO_ALVO=$(grep -l -i "Microsoft.NET.Sdk.Web" $(find . -type f -name "*.csproj") | head -n 1)
          echo "🎯 A VERDADEIRA IGNIÇÃO FOI ENCONTRADA EM: $ARQUIVO_ALVO"
          
          # Compila exatamente esse arquivo
          dotnet publish "$ARQUIVO_ALVO" -c Release -o ./publish -p:UseAppHost=false -p:GenerateRuntimeConfigurationFiles=true

      - name: 📝 Criar Dockerfile Oficial
        run: |
          cat <<'EOF' > Dockerfile.oracle
          FROM mcr.microsoft.com/dotnet/aspnet:10.0
          
          RUN apt-get update && apt-get install -y ca-certificates sqlite3 libicu-dev tzdata && rm -rf /var/lib/apt/lists/*
          
          WORKDIR /app
          
          COPY ./publish/ ./
          COPY ./UI/Web/dist/browser/ ./wwwroot/
          
          EXPOSE 5000
          ENV ASPNETCORE_URLS=http://+:5000
          
          # 🚀 SCRIPT INTELIGENTE: Pega o arquivo que tem o "runtimeconfig", descobre a DLL principal e roda!
          ENTRYPOINT ["/bin/sh", "-c", "DLL=$(ls *.runtimeconfig.json | head -n 1 | sed 's/\\.runtimeconfig\\.json/.dll/'); echo \"Iniciando motor na DLL: $DLL\"; exec dotnet \"./$DLL\""]
          EOF

      - name: 🐳 Configurar Emulador Multi-Arquitetura
        uses: docker/setup-qemu-action@v3

      - name: 🐳 Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🐳 Login no GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 📦 Construir e Publicar a Imagem Docker (ARM64)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.oracle
          platforms: linux/arm64
          push: true
          tags: ghcr.io/eufrauzino/kavita-pro:latest