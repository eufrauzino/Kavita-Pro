name: Kavita-Pro CI/CD

on:
  push:
    branches:
      - main

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: 📥 Clonar o código-fonte
        uses: actions/checkout@v4

      - name: 🟢 Preparar o Node.js (Para o Front-end)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 🏗️ Compilar o Front-end (Angular)
        run: |
          cd UI/Web
          npm install
          npm run build

      - name: 🟣 Preparar o .NET Core (Para o Backend)
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x' # O Kavita usa .NET 8

      - name: 🔨 Compilar o Backend (C#) e gerar o .tar.gz
        run: |
          # 1. Cria a pasta que o Dockerfile está a pedir
          mkdir -p _output
          
          # 2. Compila o backend C# no modo Release (Otimizado)
          # Nota: Este é o caminho padrão do Kavita. Se o .csproj estiver noutro local, avise-me.
          dotnet publish API/Kavita/Kavita.csproj -c Release -o ./temp_backend_build
          
          # 3. Zipa tudo num ficheiro .tar.gz dentro da pasta _output
          tar -czvf _output/kavita-backend.tar.gz -C ./temp_backend_build .

      - name: 🐳 Login no GitHub Container Registry (GHCR)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 📦 Construir e Publicar a Imagem Docker
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/eufrauzino/kavita-pro:latest